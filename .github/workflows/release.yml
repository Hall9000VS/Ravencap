name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_name: ravencap-${{ github.ref_name }}-linux-x86_64
            archive_name: ravencap-${{ github.ref_name }}-linux-x86_64.tar.gz
          - os: macos-15-intel
            package_name: ravencap-${{ github.ref_name }}-macos-x86_64
            archive_name: ravencap-${{ github.ref_name }}-macos-x86_64.tar.gz
          - os: macos-latest
            package_name: ravencap-${{ github.ref_name }}-macos-arm64
            archive_name: ravencap-${{ github.ref_name }}-macos-arm64.tar.gz
          - os: windows-latest
            package_name: ravencap-${{ github.ref_name }}-windows-x86_64
            archive_name: ravencap-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist "${{ matrix.package_name }}"
          cp target/release/ravencap "${{ matrix.package_name }}/"
          cp README.md CHANGELOG.md LICENSE "${{ matrix.package_name }}/"
          tar -czf "dist/${{ matrix.archive_name }}" "${{ matrix.package_name }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, "${{ matrix.package_name }}" | Out-Null
          Copy-Item target\release\ravencap.exe "${{ matrix.package_name }}\"
          Copy-Item README.md, CHANGELOG.md, LICENSE "${{ matrix.package_name }}\"
          Compress-Archive -Path "${{ matrix.package_name }}" -DestinationPath "dist\${{ matrix.archive_name }}" -Force

      - name: Upload package artifact
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.package_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: package
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Download package artifacts
        # actions/download-artifact@v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip | sort -k2 > SHA256SUMS
          cd ..

          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## " version "( |$)" { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            printf 'Release %s\n' "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      - name: Install cosign
        # sigstore/cosign-installer@v3.10.0
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62
        with:
          cosign-release: v2.6.0

      - name: Sign checksum file
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.cosign.bundle \
            --output-signature dist/SHA256SUMS.sig \
            dist/SHA256SUMS

      - name: Attest release artifacts
        # actions/attest-build-provenance@v2
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Ravencap $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag